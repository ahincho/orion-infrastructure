---
extends: default

ignore: |
  .git/
  .terraform/
  node_modules/
  .github/workflows/

rules:
  line-length:
    max: 160

  document-start: disable

  truthy:
    allowed-values: ['true', 'false', 'on', 'off']
    check-keys: false

  comments:
    min-spaces-from-content: 1
    require-starting-space: true
