# =============================================================================
# CI - Terraform Plan
# =============================================================================
# Caller del reusable en spark-match/spark-match-01-devops@main.
# Unico env (dev). Trigger: pull_request contra main + workflow_dispatch.
#
# Los inputs viven hardcoded aqui a proposito (ver AGENTS.md "Convenciones
# Terraform / GH Actions vars"). El reusable workflow se invoca con `uses:`
# lo que impide declarar `environment:` en este job (regla de GitHub
# Actions) y por tanto no permite leer GH Environment variables desde aca.
# La version de Terraform si es repo-scoped var (TF_VERSION) porque cambia
# menos seguido y conviene tenerla centralizada.
#
# Pin @main (antes @dev): los reusables fueron promovidos de @dev a @main
# en spark-match-01-devops PR #45 despues de validacion end-to-end
# (orion-infrastructure PR #24 con 8/8 checks verdes).
# =============================================================================

name: CI - Terraform Plan

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
    paths:
      - "**.tf"
      - "**.tfvars"
      - "**.md"
      - "**.markdown"
      - ".github/workflows/**"
      - "modules/**"
      - "live/**"
      - "docs/**"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  plan:
    name: Plan (dev)
    uses: spark-match/spark-match-01-devops/.github/workflows/terraform-plan.yml@main
    secrets:
      AWS_PLAN_ROLE_ARN: ${{ secrets.AWS_PLAN_ROLE_ARN }}
    with:
      environment: dev
      working-directory: live/dev
      aws-region: us-east-1
      plan-role-arn-secret: AWS_PLAN_ROLE_ARN
      terraform-version: ${{ vars.TF_VERSION }}
      backend-bucket: orion-tfstate-dev
      backend-key: dev/terraform.tfstate
      comment-on-pr: true
