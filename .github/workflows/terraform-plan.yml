# =============================================================================
# CI - Terraform Plan
# =============================================================================
# Caller del reusable en spark-match/spark-match-01-devops@dev.
# Unico env (dev). Trigger: pull_request contra main + workflow_dispatch.
#
# Pin @dev: reusables se prueban en dev antes de promover a main.
# =============================================================================

name: CI - Terraform Plan

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
    paths:
      - "**.tf"
      - "**.tfvars"
      - ".github/workflows/**"
      - "modules/**"
      - "live/**"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  plan:
    name: Plan (dev)
    uses: spark-match/spark-match-01-devops/.github/workflows/terraform-plan.yml@dev
    secrets: inherit
    with:
      environment: dev
      working-directory: live/dev
      aws-region: us-east-1
      plan-role-arn-secret: AWS_PLAN_ROLE_ARN
      terraform-version: "1.10.0"
      backend-bucket: orion-tfstate-dev
      backend-key: dev/terraform.tfstate
      comment-on-pr: true