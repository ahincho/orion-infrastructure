name: debug-secret-resolution

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  dump:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Show secret values
        env:
          AWS_PLAN_ROLE_ARN: ${{ secrets.AWS_PLAN_ROLE_ARN }}
          AWS_APPLY_ROLE_ARN: ${{ secrets.AWS_APPLY_ROLE_ARN }}
        run: |
          echo "AWS_PLAN_ROLE_ARN length=${#AWS_PLAN_ROLE_ARN}"
          echo "AWS_APPLY_ROLE_ARN length=${#AWS_APPLY_ROLE_ARN}"
          if [ -n "$AWS_PLAN_ROLE_ARN" ]; then
            echo "ARN starts with: ${AWS_PLAN_ROLE_ARN:0:20}..."
          fi
