# =============================================================================
# CD - Terraform Apply
# =============================================================================
# Caller del reusable en spark-match/spark-match-01-devops@dev.
# Trigger: push a main (auto-deploy a dev env).
#
# GH Environment "dev" sin reviewers, auto-approve (administrador puede
# mandar apply sin aprobacion manual).
# =============================================================================

name: CD - Terraform Apply

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for manual apply"
        required: false
        default: "manual trigger"

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  apply:
    name: Apply (dev)
    uses: spark-match/spark-match-01-devops/.github/workflows/terraform-apply.yml@dev
    secrets: inherit
    with:
      environment: dev
      gh-environment: dev
      working-directory: live/dev
      aws-region: us-east-1
      apply-role-arn-secret: AWS_APPLY_ROLE_ARN
      terraform-version: "1.10.0"
      backend-bucket: orion-tfstate-dev
      backend-key: dev/terraform.tfstate
      auto-approve: true