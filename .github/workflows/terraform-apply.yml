# =============================================================================
# CD - Terraform Apply
# =============================================================================
# Caller del reusable en spark-match/spark-match-01-devops@dev.
# Trigger: push a main (auto-deploy a dev env).
#
# Los inputs viven hardcoded aqui a proposito (ver AGENTS.md "Convenciones
# Terraform / GH Actions vars"). El reusable workflow se invoca con `uses:`
# lo que impide declarar `environment:` en este job (regla de GitHub
# Actions) y por tanto no permite leer GH Environment variables desde aca.
# La version de Terraform si es repo-scoped var (TF_VERSION) porque cambia
# menos seguido y conviene tenerla centralizada.
#
# GH Environment "dev" sin reviewers, auto-approve (administrador puede
# mandar apply sin aprobacion manual).
# =============================================================================

name: CD - Terraform Apply

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for manual apply"
        required: false
        default: "manual trigger"

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  apply:
    name: Apply (dev)
    uses: spark-match/spark-match-01-devops/.github/workflows/terraform-apply.yml@dev
    secrets:
      AWS_APPLY_ROLE_ARN: ${{ secrets.AWS_APPLY_ROLE_ARN }}
    with:
      environment: dev
      gh-environment: dev
      working-directory: live/dev
      aws-region: us-east-1
      apply-role-arn-secret: AWS_APPLY_ROLE_ARN
      terraform-version: ${{ vars.TF_VERSION }}
      backend-bucket: orion-tfstate-dev
      backend-key: dev/terraform.tfstate
      auto-approve: true
