# =============================================================================
# CI - Lint & Security
# =============================================================================
# Pull request linter. Calls the seven ecosystem reusables from
# `spark-match/spark-match-01-devops/.github/workflows/...` (all pinned `@dev`
# per AGENTS.md). Each job is a thin `uses:` dispatch; source of truth lives in
# spark-match-01-devops so all ORION repos get the same checks without drift.
#
# Jobs:
#   - actionlint         :: GH Actions syntax  (ecosystem, since PR #41)
#   - gitleaks           :: secret history     (ecosystem, since PR #41, v1 pin)
#   - yamllint           :: YAML lint          (ecosystem, since PR #41)
#   - terraform-fmt      :: terraform fmt      (ecosystem, since PR #43)
#   - terraform-validate :: terraform validate (ecosystem, since PR #43)
#   - tflint             :: tflint             (ecosystem, since PR #43)
#   - checkov            :: checkov SCA        (ecosystem, since PR #43)
#
# No secrets forwarded. Terraform-version is the one repo-scoped var we read
# from the caller side (per AGENTS.md "Convenciones Terraform / GH Actions vars").
# =============================================================================

name: CI - Lint & Security

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
    paths:
      - ".github/**"
      - "**.yml"
      - "**.yaml"
      - "**.md"
      - "**.tf"
      - "**.sh"

permissions:
  contents: read

# Cancel in-progress runs for the same PR + branch. Saves runner minutes on
# rapid pushes. The cancel-in-progress: true is safe for lint jobs (idempotent).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------- ecosystem reusables ------------------------------------------------

  actionlint:
    name: actionlint
    uses: spark-match/spark-match-01-devops/.github/workflows/actionlint.yml@dev
    with:
      environment-name: ci

  gitleaks:
    name: gitleaks
    uses: spark-match/spark-match-01-devops/.github/workflows/gitleaks.yml@dev
    with:
      environment-name: ci

  yamllint:
    name: yamllint
    uses: spark-match/spark-match-01-devops/.github/workflows/yamllint.yml@dev
    with:
      environment-name: ci

  # ---------- terraform ecosystem reusables (PR #43) -----------------------------

  terraform-fmt:
    name: terraform fmt
    uses: spark-match/spark-match-01-devops/.github/workflows/terraform-fmt.yml@dev
    with:
      environment-name: ci
      terraform-version: ${{ vars.TF_VERSION }}

  terraform-validate:
    name: terraform validate
    uses: spark-match/spark-match-01-devops/.github/workflows/terraform-validate.yml@dev
    with:
      environment-name: ci
      terraform-version: ${{ vars.TF_VERSION }}

  tflint:
    name: tflint
    uses: spark-match/spark-match-01-devops/.github/workflows/tflint.yml@dev
    with:
      environment-name: ci
      terraform-version: ${{ vars.TF_VERSION }}

  checkov:
    name: checkov
    uses: spark-match/spark-match-01-devops/.github/workflows/checkov.yml@dev
    with:
      environment-name: ci
