name: CI - Lint & Security

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
    paths:
      - ".github/**"
      - "**.yml"
      - "**.yaml"
      - "**.md"
      - "**.tf"
      - "**.sh"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  actionlint:
    name: actionlint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download actionlint binary
        id: get_actionlint
        run: bash <(curl --fail --silent --show-error --location https://raw.githubusercontent.com/rhysd/actionlint/v1.7.7/scripts/download-actionlint.bash)
        shell: bash

      - name: Run actionlint
        run: ${{ steps.get_actionlint.outputs.executable }} -color

  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      # We run gitleaks directly instead of using the `gitleaks/gitleaks-action`
      # third-party action. Rationale: every release of that action
      # (v1, v2, v3) hardcodes `git log -p <sha>^..<sha>` and silently
      # ignores the `args:` input that would let us pass `--no-git`.
      # That history scan breaks on the 1-commit branches produced by
      # dependabot (parent commit `<sha>^` does not exist in a shallow
      # checkout). Running gitleaks ourselves means:
      #   - we always scan only the working tree (`--no-git`)
      #   - no action-version dependency, no Node 20 EOL risk
      #   - secrets in output are redacted (`--redact`)
      # Binary version is pinned to a tag; bump via Dependabot (regular
      # `github-actions` ecosystem would not detect this — we leave it
      # to manual review since gitleaks is a security tool).
      - name: Run gitleaks (working tree only, pinned binary)
        env:
          GITLEAKS_VERSION: "8.24.3"
        run: |
          set -euo pipefail
          ARCH="linux_x64"
          URL="https://github.com/zricethezav/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_${ARCH}.tar.gz"
          echo "Downloading gitleaks v${GITLEAKS_VERSION} from ${URL}"
          curl -sSfL --retry 3 -o /tmp/gitleaks.tar.gz "${URL}"
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          /tmp/gitleaks version
          echo "Scanning working tree ..."
          /tmp/gitleaks detect --no-git --redact --exit-code=2 --source .

  yamllint:
    name: yamllint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install yamllint
        run: pip install --quiet yamllint==1.35.1

      - name: Run yamllint
        run: yamllint .

  tflint:
    name: tflint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ vars.TF_VERSION }}

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: latest

      - name: Run tflint
        run: tflint --recursive