name: CI - Lint & Security

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
    paths:
      - ".github/**"
      - "**.yml"
      - "**.yaml"
      - "**.md"
      - "**.tf"
      - "**.sh"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  actionlint:
    name: actionlint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Download actionlint binary
        id: get_actionlint
        run: bash <(curl --fail --silent --show-error --location https://raw.githubusercontent.com/rhysd/actionlint/v1.7.7/scripts/download-actionlint.bash)
        shell: bash

      - name: Run actionlint
        run: ${{ steps.get_actionlint.outputs.executable }} -color

  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # gitleaks-action@v3 hardcodes `git log -p <sha>^..<sha>` and ignores
      # our `args` input (the `args:` field is silently dropped in v3's
      # action.yml). With a default shallow checkout (fetch-depth: 1),
      # dependabot's 1-commit branches break: `<sha>^` doesn't exist in
      # the local repo, so the action exits with code 1.
      #
      # Fix: use `fetch-depth: 0` so every commit's parent is in the local
      # repo. gitleaks-action then successfully scans the diff
      # `<head>^..<head>` — which contains only the PR's commit content —
      # matching what `git diff` would show for the PR. No need to scan
      # the whole history because each PR contains at most its own
      # commit's worth of new code.
      - name: Checkout repository (full history for gitleaks v3)
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Run gitleaks (latest version)
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  yamllint:
    name: yamllint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install yamllint
        run: pip install --quiet yamllint==1.35.1

      - name: Run yamllint
        run: yamllint .

  tflint:
    name: tflint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ vars.TF_VERSION }}

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v6
        with:
          tflint_version: latest

      - name: Run tflint
        run: tflint --recursive

  terraform-fmt:
    name: terraform fmt
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ vars.TF_VERSION }}

      - name: Run terraform fmt -check
        run: terraform fmt -check -recursive -diff

  terraform-validate:
    name: terraform validate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ vars.TF_VERSION }}

      # init -backend=false por directorio: descarga providers sin tocar el
      # backend S3 (no requiere creds AWS). Valida live/dev + los 2 modulos.
      - name: terraform init -backend=false (por modulo)
        run: |
          set -euo pipefail
          for d in live/dev modules/storage-tfstate modules/oidc-github; do
            echo "::group::init $d"
            terraform -chdir="$d" init -backend=false -upgrade=false
            echo "::endgroup::"
          done

      - name: terraform validate (por modulo)
        run: |
          set -euo pipefail
          for d in live/dev modules/storage-tfstate modules/oidc-github; do
            echo "::group::validate $d"
            terraform -chdir="$d" validate
            echo "::endgroup::"
          done

  checkov:
    name: checkov
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install checkov
        run: pip install --quiet checkov==3.2.415

      # --soft-fail durante onboarding: reporta findings en el log sin romper
      # CI. Una vez revisados los hallazgos, pasar a hard fail con skip-check
      # justificados en .checkov.yml (ver follow-up issue).
      - name: Run checkov (soft-fail onboarding)
        run: checkov --directory . --framework terraform --compact --soft-fail