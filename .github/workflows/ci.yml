name: CI - Lint & Security

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
    paths:
      - ".github/**"
      - "**.yml"
      - "**.yaml"
      - "**.md"
      - "**.tf"
      - "**.sh"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  actionlint:
    name: actionlint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download actionlint binary
        id: get_actionlint
        run: bash <(curl --fail --silent --show-error --location https://raw.githubusercontent.com/rhysd/actionlint/v1.7.7/scripts/download-actionlint.bash)
        shell: bash

      - name: Run actionlint
        run: ${{ steps.get_actionlint.outputs.executable }} -color

  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # gitleaks-action@v3 hardcodes `git log -p <sha>^..<sha>` and ignores
      # our `args` input (the `args:` field is silently dropped in v3's
      # action.yml). With a default shallow checkout (fetch-depth: 1),
      # dependabot's 1-commit branches break: `<sha>^` doesn't exist in
      # the local repo, so the action exits with code 1.
      #
      # Fix: use `fetch-depth: 0` so every commit's parent is in the local
      # repo. gitleaks-action then successfully scans the diff
      # `<head>^..<head>` — which contains only the PR's commit content —
      # matching what `git diff` would show for the PR. No need to scan
      # the whole history because each PR contains at most its own
      # commit's worth of new code.
      - name: Checkout repository (full history for gitleaks v3)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run gitleaks (latest version)
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  yamllint:
    name: yamllint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install yamllint
        run: pip install --quiet yamllint==1.35.1

      - name: Run yamllint
        run: yamllint .

  tflint:
    name: tflint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ vars.TF_VERSION }}

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: latest

      - name: Run tflint
        run: tflint --recursive